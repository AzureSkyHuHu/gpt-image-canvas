services:
  app:
    container_name: ${APP_CONTAINER_NAME:-gpt_image_canvas_app}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:23-bullseye-slim}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8787}
      DATA_DIR: /app/data
      SQLITE_JOURNAL_MODE: ${SQLITE_JOURNAL_MODE:-DELETE}
      SQLITE_LOCKING_MODE: ${SQLITE_LOCKING_MODE:-EXCLUSIVE}
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "piachi-tools.test.com:host-gateway"
    restart: always
    networks:
      - infra

networks:
  infra:
    external: true
    name: ${APP_DOCKER_NETWORK:-dnmp-infra}
