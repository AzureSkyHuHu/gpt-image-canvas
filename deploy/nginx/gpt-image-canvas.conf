# GPT Image Canvas 反向代理示例。
# 用法：
# 1. 把本文件放到 Nginx 的 conf.d 目录，或复制整份配置到你的站点配置。
# 2. 确认 Nginx 容器和应用容器加入同一个 Docker 网络，默认是 dnmp-infra。
# 3. 将 image.example.com 替换为你的域名。

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream gpt_image_canvas_app {
  server gpt_image_canvas_app:8787;
  keepalive 32;
}

server {
  listen 80;
  server_name image.example.com;

  client_max_body_size 120m;
  proxy_read_timeout 1200s;
  proxy_send_timeout 1200s;
  proxy_connect_timeout 60s;

  location / {
    proxy_pass http://gpt_image_canvas_app;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
